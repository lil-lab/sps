# @package _global_

# S Delayed State baseline (deterministic sliding predicts, window_size=64)

defaults:
  - override /model: delayed_state
  - override /data: fineweb-edu

experiment:
  name: s_delayed_state_w64_20b
  tags: [s, delayed_state, sliding_predict_tokens, deterministic, w64, 20b, triton]

model:
  config:
    n_layer: 12
    n_head: 12
    hidden_size: 768
    intermediate_size: 2304  # 3 * hidden_size
    dropout: 0.0
    window_size: 64
    enable_triton_attention: true

logging:
  wandb_run_name: ${experiment.name}

training:
  max_tokens: 20000000000
  eval_interval_tokens: 40000000
  save_every: 2000000000  # Save checkpoint every 2B tokens
  skip_first_eval: false

scheduler:
  lr_decay_tokens: 2000000000
  warmup_tokens: 50000000
