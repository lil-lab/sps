# @package _global_

# Baseline with standard transformer (no predicts)
# Usage: python train.py +experiment=baseline_standard

defaults:
  - override /model: standard
  - override /data: fineweb-edu

# Experiment metadata
experiment:
  name: m_full_attention_20b
  tags: [m, full_attention, 20b]

# Model configuration (s scale)
model:
  config:
    n_layer: 24
    n_head: 16
    hidden_size: 1024
    intermediate_size: 3072  # 3 * hidden_size

# Logging override
logging:
  wandb_run_name: ${experiment.name}

training:
  max_tokens: 20000000000
  eval_interval_tokens: 40000000
  save_every: 2000000000  # Save checkpoint every 1B tokens
  skip_first_eval: false

scheduler:
  lr_decay_tokens: 2000000000
  warmup_tokens: 100000000

