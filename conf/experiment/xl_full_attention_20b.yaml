# @package _global_

# XL full attention baseline matching the XL SPS / Delayed State 20B model size.

defaults:
  - override /model: standard
  - override /data: fineweb-edu

experiment:
  name: xl_full_attention_20b
  tags: [xl, full_attention, 20b, triton]

model:
  config:
    n_layer: 48
    n_head: 25
    hidden_size: 1600
    intermediate_size: 4800  # 3 * hidden_size
    dropout: 0.0
    use_triton_full_attention: true

logging:
  wandb_run_name: ${experiment.name}

training:
  max_tokens: 20000000000
  eval_interval_tokens: 40000000
  save_every: 2000000000
  skip_first_eval: false
  micro_batch_size: 6

scheduler:
  lr_decay_tokens: 2000000000
  warmup_tokens: 100000000
